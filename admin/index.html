<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Nudibranch Nerd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barrio&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080f18;
      --card: rgba(255,255,255,0.04);
      --border: rgba(148,210,255,0.15);
      --accent: #94D2FF;
      --font-sans: 'Inter', sans-serif;
      --font-serif: 'Barrio', cursive;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .login-logo {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .login-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(148,210,255,0.5);
      text-align: center;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
    }

    button[type="submit"] {
      background: var(--accent);
      border: none;
      border-radius: 3px;
      color: var(--bg);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      padding: 0.8rem;
      text-transform: uppercase;
      transition: background 0.2s;
      width: 100%;
    }

    button[type="submit"]:hover { background: #fff; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: #ff6b6b;
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.1em;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">Nudibranch Nerd</div>
    <div class="login-label">Admin Access</div>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" />
    <button type="submit" id="login-btn">Enter</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script>
    const btn = document.getElementById('login-btn');
    const pw  = document.getElementById('pw');
    const err = document.getElementById('error-msg');

    async function login() {
      const password = pw.value.trim();
      if (!password) return;
      btn.disabled = true;
      btn.textContent = '…';
      err.textContent = '';
      try {
        const res = await fetch('/.netlify/functions/cms-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        sessionStorage.setItem('cms_token', data.token);
        // Redirect to home with admin mode active
        window.location.href = '/';
      } catch (e) {
        err.textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Enter';
        pw.focus();
      }
    }

    btn.addEventListener('click', login);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    pw.focus();
  </script>
</body>
</html>
